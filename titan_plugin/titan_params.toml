# ── TUNING-017: monoculture + repeat decay controls ──
# 2026-04-19 rFP_cgn_keystone_completion COMPLETE-5: SUNSET.
# Both pressures replaced by chain_iql v2's UCB1 exploration. UCB gives
# low-visit templates a sqrt(log(N)/n) bonus that principled-ly drives
