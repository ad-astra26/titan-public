# not "reach target". Fix: bump k + cap novelty so task signal dominates.
#
# 2026-04-20 iter-3 — iter-2 (k=2.0 + cap=0.15) still left novelty ~40× G2. The
# three knobs flagged by iter-2 author now applied together (per rFP): bump k
# to 7, tighten cap to 0.05, remove grid-size normalization in
# goal_detector.character_target_reward (30×30 grid: was returning
# delta/60 ≈ 0.017/step, now returns delta ≈ 1.0/step at k=7 → 7.0/step).
# arc_iter_3_enabled is a feature flag; set to false to revert to iter-2
# behavior without a redeploy.
