break_base = 0.05
break_recovery_weight = 0.12                # post-break chain success
break_eureka_weight = 0.08                  # if BREAK enabled EUREKA
break_timechain_pattern_weight = 0.06       # historical break wisdom
break_contract_trigger_weight = 0.05        # contract-driven break
break_cost_weight = -0.05                   # always-on penalty (was -0.10)

# ── Cross-primitive (legacy diversity safety net) ──
# The legacy reward path in meta_reasoning._compute_legacy_meta_reward
# uses hardcoded 0.05 / 0.15 — these DNA keys are reserved for the future
# refactor that moves the legacy diversity logic into the DNA-driven path.
# Currently unused; kept here for forward-compatibility.
# diversity_bonus_max = 0.15
# diversity_unique_step = 0.05

# ── Sub-phase B: Chain-level IQL ──
# 2026-04-19 v2 redesign (rFP_chain_iql_v2): LRU eviction + UCB1 exploration
# replace the v1 slot-0-FIFO pathology that caused 98.7% of chains to alias
# to template_id=0 across 3 Titans for weeks. Template cap raised 50→500 to
# match principled template space (no memory/compute reason to cap at 50).
chain_iql_buffer_size = 1000        # Recent chain outcomes for IQL training
chain_template_max_count = 500      # was 50 — arbitrary v1 cap removed (rFP_chain_iql_v2 FIX-2)
task_embedding_dim = 32             # Hash size for task encoding
chain_qnet_lr = 0.001               # IQL Q-net learning rate
chain_blend_alpha = 0.5             # 50% MetaPolicy + 50% chain-Q (initial)
chain_iql_ucb_c = 0.3               # UCB1 exploration coefficient (rFP_chain_iql_v2 FIX-3)
                                    # Higher = more exploration; 0 disables UCB (argmax Q only)

# ── Sub-phase C: Cognitive contracts ──
# Detailed contract DNA lives in [cognitive_contracts_dna] below; only the
# master enable toggle stays here so the meta-reasoning engine can read it.
# (cognitive_contracts_enabled is set at the top of [meta_reasoning_dna].)

# ── Reward blending (legacy ↔ compound) ──
# Sub-phase A blends the legacy structural reward with the new per-primitive
# compound reward inside _compute_meta_reward(). Higher α → trust the new
# compound path more (faster collapse-escape, but more volatile during
# learning). Lower α → trust the legacy path more (more stable, slower
# transition). Per-Titan overrides below let each personality tune its
# trust ratio. Default 0.5 = balanced.
# 2026-04-09: lifted out of meta_reasoning.py:2305 hardcode (Phase D pre-flight).
compound_legacy_blend_alpha = 0.5

# ── Subsystem signal cache (A-finish) ──
# How long the meta-reasoning engine reuses subsystem-derived signals
