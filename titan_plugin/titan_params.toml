# REASONING LAYER — Mind's Deliberate Cognition
# ═══════════════════════════════════════════════════════════════════
# Composable logic primitives (COMPARE, IF_THEN, SEQUENCE, ASSOCIATE,
# DECOMPOSE, LOOP, NEGATE) selected by a small policy network, modulated
