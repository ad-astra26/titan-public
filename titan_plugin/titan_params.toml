# ── Goal-signal reward shaping (rFP_arc_training_fix 2026-04-13; rebalanced 2026-04-15) ────
# G1 empirical capture: on WIN, goal grid is persisted to data/arc_agi_3/goal_grids.json.
# Subsequent episodes use similarity-to-goal as a dense reward gradient.
# G2 ls20 heuristic: character-target manhattan delta (unblocks ls20 pre-first-win).
