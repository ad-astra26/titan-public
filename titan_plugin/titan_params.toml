# The "ribosome" — reads StateRegister (DNA), produces reward signals.

[titan_vm]
# Maximum stack depth for VM execution
max_stack_depth = 64

# Maximum instructions per program execution (prevents infinite loops)
max_instructions = 500

# Whether to publish REFLEX_REWARD to bus after scoring
