# relevance) before re-querying. Per rFP §7.A: "30s default, one fetch
# per chain not per step". Resolves rFP §14 Open Question #1.
# Trade-off: lower TTL = fresher signals + more bus traffic; higher TTL =
# less bus load + more stale rewards. 30s is balanced for ~5-10 chains
