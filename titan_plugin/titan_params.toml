# ── monoculture_detector (R3 — NEW genesis, fires per dream cycle) ──
# THE escape-pressure contract. Detects single-primitive dominance and
# emits META_DIVERSITY_PRESSURE so spirit_worker can apply a directed
# negative bias to the dominant primitive (not random ε-greedy noise).
# This is the active control loop that turns Phase C from "passive
