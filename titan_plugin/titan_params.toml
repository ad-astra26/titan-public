# 2026-04-15 rebalance — diagnostics from 50 T1 episodes showed novelty_reward
# (sum of order/entropy/diff/movement/concentration bonuses up to +0.41 per
# step) SWAMPING character_target_reward (bounded ~0.015 per step at k=0.3
