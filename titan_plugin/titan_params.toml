# → low-visit alternatives win). No hardcoded repeat penalty needed.
repeat_decay_per_step = 0.0   # was 1.5 — sunset
repeat_decay_max = 0.0        # was 5.0 — sunset

# SOAR repeat-impasse detection (extends D.2 impasse with primitive-loop awareness)
soar_repeat_threshold = 3           # N consecutive same-primitive = repeat_stuck impasse
soar_repeat_urgency = 0.8           # urgency (between declining=0.7 and stuck=0.9)

# Subsystem signal cache TTL — wired in Sub-phase D (next session) when
# meta_reasoning starts firing live TimeChain/Contract bus queries. The
# cache lets multiple primitives in the same chain reuse one fetch.
# subsystem_cache_ttl_sec = 30.0

# ── RECALL Compound — Inner Memory + TimeChain + Contracts ──
