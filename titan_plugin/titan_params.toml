# Operates at Mind rate (~0.87 Hz currently, will scale with Schumann).
# All timing is dt-parameterized.

[reasoning]
enabled = true
max_chain_length = 10          # Maximum reasoning steps before forced CONCLUDE
min_chain_length = 6           # Raised 3→6 on 2026-04-16 — see TUNING-015 in TUNING_DATABASE.md
# Rationale: RL buffer analysis showed 100% of chains were exactly 3 steps —
# policy had learned to CONCLUDE at the earliest legal step to maximize
# reward-rate (terminal reward only, intermediate rewards = 0). Raising min
# forces policy to experience longer chains, where confidence may rise
# enough to COMMIT instead of ABANDON. Proper fix (dense intermediate
# rewards) is tracked as rFP; this is the behavioral nudge to get data on
# whether length or reward-shape is the binding constraint.
confidence_threshold = 0.50    # Mind Willing commitment threshold (was 0.6 — lowered to break FORMULATE abandon cycle)
save_dir = "./data/reasoning"

# Policy network architecture
# Input: observation(79D) + gut_signals(11D) + mind_neuromods(6D) + chain_state(3D) + mini_summaries(16D) = 115D
policy_input_dim = 115
policy_h1 = 64
policy_h2 = 32
learning_rate = 0.001

# Cognitive EMA — neuromod smoothing per level
# Mind: ~20 ticks (~70s at 0.29Hz) effective window → stable for reasoning
# Spirit: ~100 ticks (~350s) → patient trend awareness
mind_ema_alpha = 0.05
spirit_ema_alpha = 0.01

# Spirit observer — gentle nudges only
