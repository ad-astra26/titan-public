server {
    server_name iamtitan.tech;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Genesis birth certificate — NFT metadata URI
    location = /genesis.json {
        alias /home/antigravity/projects/titan/nft-assets/genesis.json;
        add_header Content-Type "application/json" always;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=86400";
    }

    # Genesis birth certificate — human-readable page
    location = /genesis {
        alias /home/antigravity/projects/titan/nft-assets/genesis.html;
        add_header Content-Type "text/html" always;
        add_header Cache-Control "public, max-age=3600";
    }

    # Solscan TX shortener
    location /tx/ {
        rewrite ^/tx/(.+)$ https://explorer.solana.com/tx/$1 redirect;
    }

    # Arweave artifact shortener (rFP_x_voice_enrichment §4.6 — PROOF_DAY)
    location /ar/ {
        rewrite ^/ar/(.+)$ https://arweave.net/$1 redirect;
    }


    location /nft-assets/ {
        alias /home/antigravity/projects/titan/nft-assets/;
        add_header Access-Control-Allow-Origin *;
        expires 30d;
    }

    # Next.js Pitch UI proxy (server-side fetch that injects PITCH_TOKEN

    # and forwards to per-Titan internal URLs). MUST be matched BEFORE the

    # generic /api/ block which proxies to FastAPI:7777 — pitch-chat-proxy

    # is a Next.js route at :3000. Diagnosed 2026-05-12: without this exact

    # match, browser fetches to /api/pitch-chat-proxy were routed to backend

    # which 404s + nginx 504s at proxy_read_timeout 10s.

    # proxy_read_timeout 200s = pitch-chat-proxy internal timeout 195s + margin.

    location = /api/pitch-chat-proxy {

        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;

        proxy_read_timeout 200s;

        proxy_send_timeout 10s;

    }

    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:7777;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        limit_req zone=api_limit burst=40 nodelay;
        limit_conn conn_limit 30;
        proxy_cache titan_cache;
        proxy_cache_valid 200 3s;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    location ~ ^/(health|status|maker|webhook|media|v3|v4|v6|debug) {
        proxy_pass http://127.0.0.1:7777;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        limit_req zone=api_limit burst=40 nodelay;
        limit_conn conn_limit 30;
        proxy_cache titan_cache;
        proxy_cache_valid 200 3s;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # T2 API proxy — routes to Titan 2 on VPC (10.135.0.6:7777)
    location ~ ^/t2/(health|status|v3|v4|v6|debug|chat|media) {
        rewrite ^/t2/(.*) /$1 break;
        proxy_pass http://10.135.0.6:7777;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        limit_req zone=api_limit burst=40 nodelay;
        limit_conn conn_limit 30;
        proxy_cache titan_cache;
        proxy_cache_valid 200 3s;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # T3 API proxy — routes to Titan 3 on VPC (10.135.0.6:7778)
    location ~ ^/t3/(health|status|v3|v4|v6|debug|chat|media) {
        rewrite ^/t3/(.*) /$1 break;
        proxy_pass http://10.135.0.6:7778;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        limit_req zone=api_limit burst=40 nodelay;
        limit_conn conn_limit 30;
        proxy_cache titan_cache;
        proxy_cache_valid 200 3s;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /ws {
        proxy_pass http://127.0.0.1:7777;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        limit_conn conn_limit 10;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/iamtitan.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iamtitan.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = iamtitan.tech) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name iamtitan.tech;
    return 404;
}
