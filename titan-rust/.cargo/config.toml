# Dev (GNU target) builds link with mold instead of GNU ld — faster relink of the
# 9 workspace binaries on each edit (a single-file touch measured 2m08s, much of
# which is the 9 separate link steps). Scoped to x86_64-unknown-linux-gnu ONLY:
# the shippable musl target (built once on localhost, scp'd to T2/T3) keeps the
# default linker so build_titan_rust.sh's static-linkage verifier + binary
# determinism are untouched. Requires `mold` (apt install mold) — only the dev
# box does GNU/debug builds; T2/T3 receive prebuilt musl binaries.
[target.x86_64-unknown-linux-gnu]
linker = "cc"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
