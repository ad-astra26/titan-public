# ─── FILTER_DOWN (Learned Attention — RL Value Network) ──────────
# Learns which Trinity dimensions matter most via TD(0) gradient descent.
# Outputs severity multipliers that modulate Body/Mind perception.

[filter_down]
# TD(0) discount factor (future reward importance)
# Influences: how much future states affect current value estimate
# Affects: learning horizon — higher = more farsighted
gamma = 0.95

# Gradient descent learning rate
# Influences: speed of weight updates
# Affects: learning stability — too high = oscillation, too low = slow
# CRITICAL: affects ALL downstream Intuition learning
learning_rate = 0.001

# Mini-batch size for training passes
# Influences: gradient estimate quality
# Affects: training speed vs stability tradeoff
batch_size = 16

# Maximum stored transitions in replay buffer
# Influences: memory of past experiences for training
# Affects: catastrophic forgetting resistance
buffer_max = 2000

# Minimum transitions before training begins (cold start protection)
# Influences: when learning kicks in after boot
# Affects: early behavior — more = safer start, fewer = faster learning
min_transitions = 32

# Train every N new transitions added
# Influences: training frequency
# Affects: responsiveness to new experiences
# Ratio: should be < batch_size (train more often than batch fills)
train_every_n = 5

# Severity multiplier floor (never fully mute a dimension)
# Influences: minimum attention any dimension receives
# Affects: ensures no sense is completely ignored
multiplier_floor = 0.3

# Severity multiplier ceiling (maximum amplification)
# Influences: maximum attention any dimension receives
# Affects: prevents one dimension from overwhelming others
# Symmetry: ceil/floor ratio = 10:1 (maximum dynamic range)
multiplier_ceil = 3.0

# EMA smoothing for multiplier updates (0-1, higher = smoother)
# Influences: how gradually multipliers change
# Affects: stability of perception — higher = less jitter
smoothing = 0.9


# ─── rFP #2 FILTER_DOWN V5 (162D TITAN_SELF-driven) ──────────────
