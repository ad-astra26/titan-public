maturity_total_fires_target = 500      # Lived hormone experience
maturity_infant_cap = 2.0              # Excitation cap at maturity=0 (×threshold)
maturity_mature_cap = 5.0              # Excitation cap at maturity=1 (×threshold)

# ── rFP_titan_vm_v2 Phase 3 §3.11 — cross-program coupling ──────────
# When enabled, co-firing biological pairs nudge each other's warmup
# target by coupling_strength × partner_score (scaled by sup_weight so
# coupling decays with warmup exit). 0 effect post-warmup. Six pairs
# are hardcoded at class-init (EMPATHY↔REFLECTION, CURIOSITY↔INSPIRATION,
# CREATIVITY↔INSPIRATION, FOCUS↔INTUITION, METABOLISM↔VIGILANCE,
# IMPULSE↔REFLEX) but can be overridden with `pairs` array.
# Default false — flip after Phase 2 consolidation soak passes, and
# only on explicit Maker greenlight (Phase 3 = CRITICAL gate; NN
# weights persist across restart, so a bad coupling weight bakes
# supervision corruption into the learned model with no clean rollback).
[neural_nervous_system.coupling]
enabled = false
strength = 0.1
fire_threshold = 0.3

# ── rFP_titan_vm_v2 Phase 3 §3.12 — eligibility traces ──────────────
