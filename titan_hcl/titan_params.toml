# ─── TRINITY RESTORING FORCE (SPEC §G5.2 / D-SPEC-112 — homeostasis kernel) ──
# Per-Titan, per-LAYER tunable gains for the §G5.2 closed-form integrator
# running inside the 6 trinity-part daemons (inner/outer × body/mind/spirit).
# Inner+outer of the same layer share one tuning unit (matches Rust `Layer`
# enum {Body, Mind, Spirit} and PLAN §6.6.2 — "Body (inner+outer): keep
# k_drive ~ 0.30 ... Mind (inner+outer): bump k_drive 0.30 → 0.40 ...").
#
# Python L2 reads the three subsections at startup and publishes them as one
# fixed-layout SHM sidecar `trinity_restoring.bin` in shm_dir/ (3 layers × 8
# floats × 4 bytes = 96 bytes, ordered body[0:32] → mind[32:64] → spirit[64:96]).
# Each Rust daemon retry-loads at boot and refreshes at ~1s cadence
# (titan-trinity-daemon::restoring_cfg::load_for_layer indexes its layer's
# 32-byte slice based on the `Layer` enum).
#
# Per-layer schema D-SPEC-129 (v1.59.2, 2026-05-25) replaces the previous flat
# `[trinity_restoring]` single-set-of-gains layout (8 floats / 32 bytes). All
# 6 daemons previously got identical gains; bumping mind without affecting
# body/spirit required the per-layer extension. No shims — flat schema deleted
# (`feedback_no_shim_old_path_must_be_deleted`).
#
# Layer gradient (INV-9 body 0.7/0.3, mind 0.5/0.5, spirit 0.3/0.7) is
# STRUCTURAL — fixed in the Rust kernel, NOT a TOML key. Neuromod gain is LIVE
# — read from neuromod_state.bin per tick, NOT a TOML key.
#
# Risk note (PLAN §7): k_restore too high pins tensors at 0.5 (kills the
# journey). Start gentle (0.05) and tune up only after the §3 VERIFY gate
# observes outer coherence crossing the §G11 balance threshold without
# over-damping.

[trinity_restoring]
# Top-level reserved for future shared constants; per-layer gains live in the
# three subsections below.

[trinity_restoring.body]
# k_drive: how fast the tensor tracks the raw producer per tick.
# Body already gets natural sensor perturbation; keep at the conservative
# default. P0.6-A audit (2026-05-25) shows body breath_score 0.479–0.882 —
# some dims breathing, none catastrophically flat. Tuning unnecessary.
k_drive = 0.30
k_restore = 0.05
k_damp = 0.05
k_mom = 0.10
k_dir = 0.05
a_mag = 0.50
a_drift = 1.00
a_dmag = 0.50

[trinity_restoring.mind]
# k_drive: BUMPED 0.30 → 0.40 per P0.6-B (PLAN §6.6.2). P0.6-A audit
# (`AUDIT_p0_6_a_dim_breath_summary_20260525.md`) shows mind dims are flat
# fleet-wide: std 0.01–0.05, cluster% 95–100%, NO bimodal saturation. Raw NS
# / neuromod signal exists at source — the §G5.2 restoring spring is too
# strong relative to drive, smoothing the perturbation away before it reaches
# the published tensor. Lifting k_drive lets mind "feel" raw signal more.
k_drive = 0.40
k_restore = 0.05
k_damp = 0.05
k_mom = 0.10
k_dir = 0.05
a_mag = 0.50
a_drift = 1.00
a_dmag = 0.50

[trinity_restoring.spirit]
# k_drive: unchanged for P0.6-B — PLAN §6.6.2 says "lower k_drive for
# self-feedback loop (under review per P0.6-A findings)" but P0.6-A only
# covered the 40 BMS dims (no spirit). Keeping at the conservative default
# until a spirit-specific audit (P0.6-A-bis) informs the tuning decision.
k_drive = 0.30
k_restore = 0.05
k_damp = 0.05
k_mom = 0.10
k_dir = 0.05
a_mag = 0.50
a_drift = 1.00
a_dmag = 0.50


# ─── GUARDIAN (Module Supervision) ────────────────────────────────
# Process lifecycle management for all Trinity workers.

[guardian]
# Default heartbeat timeout (seconds)
# Influences: how long before a silent module is declared dead
# Affects: restart sensitivity
heartbeat_timeout_default = 90.0

# Spirit-specific heartbeat timeout (heavy V4 work)
# Influences: Spirit tolerance for long operations
# Affects: false-positive restart prevention
heartbeat_timeout_spirit = 120.0

# Max restarts in sliding window before disabling
# Influences: crash tolerance
# Affects: system resilience vs resource waste
max_restarts_in_window = 5

# Sliding window size for restart tracking (seconds)
# Influences: how quickly restart count "forgets"
# Affects: recovery from transient vs persistent failures
restart_window = 600.0

# Sustained uptime before restart count resets (seconds)
# Influences: when a module is considered "stable"
# Affects: restart budget replenishment
sustained_uptime_reset = 300.0

# Phase 9 Chunk 9L (RFP §3F.2.6) — staggered boot to eliminate cold-boot
# CPU contention. ~40 autostart modules booting in parallel on a 4-core VPS
# oversubscribed CPU 5-6×, causing cascade heartbeat-timeouts (audit
# AUDIT_agno_chat_hang_diagnosis_20260527). Stagger start() calls so import
# + Agent-init CPU spikes don't pile up. Order: dependency-correct (§11.G)
# + layer-ascending (L1→L2→L3) + alphabetic. Total boot ≈ N × stagger
# (40 × 1.5s ≈ 60s; within 1-minute fleet-up target).
# Influences: cold-boot wall time vs cold-boot stability
# Affects: heartbeat-timeout false-positives during fleet boot
boot_stagger_delay_s = 1.5

# Phase 11 §11.I.7/§11.I.8 boot-speed tuning (2026-05-28). The continuous
# probe poller (RFP 11D) drives every `booted` slot → `running` at 1Hz, so the
# boot pipeline no longer needs to BLOCK for the full per-module probe budget on
# each wave — §11.I.7 explicitly allows the next wave to proceed "or per-module
# probe timeout" and the poller finishes any straggler. These two knobs restore
# monolith-class boot speed (~2 min full) lost when Phase 11 added blocking
# waves + a conservative 5s post-boot stagger:
#   * probe_wait_timeout_s — per-wave readiness wait cap (poller backstops).
#     30s blocked ~80s across 3 mandatory waves on cold 4-core boot; 15s halves
#     it. _wait_for_module_running (dep-activation/reload) uses this same budget.
#   * post_boot_stagger_delay_s — spacing between Phase B (OPTIONAL_POST_BOOT)
#     spawns. 5s × 29 = 145s of pure delay; 1.5s (= mandatory stagger, proven
#     safe at 9L) cuts Phase B to ~44s. CPU-spike risk is low now that the
#     heartbeat cascade is fixed (centralized ModuleStateWriter daemon).
probe_wait_timeout_s = 15.0
post_boot_stagger_delay_s = 1.5


