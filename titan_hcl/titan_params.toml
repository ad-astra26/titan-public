# SCHUMANN HARMONIC FREQUENCIES — V6 dt-parameterization
# ═══════════════════════════════════════════════════════════════════
# True Schumann base: 7.83 Hz (Earth's electromagnetic resonance).
# Body resonates AT Schumann. Mind and Spirit tune UP via power-of-3.
# body = 7.83 Hz (0.1277s), mind = 23.49 Hz (0.0426s), spirit = 70.47 Hz (0.0142s)
# The 1:3:9 ratio (Body:Mind:Spirit frequencies) is the fundamental harmonic.
[schumann]
base_frequency = 7.83            # Schumann fundamental resonance (Hz) — true measured average
# Power-of-3 hierarchy: body AT Schumann, mind and spirit tune UP
body_multiplier = 1              # body_freq = base × 1 = 7.83 Hz  → period 0.1277s
mind_multiplier = 3              # mind_freq = base × 3 = 23.49 Hz → period 0.0426s
spirit_multiplier = 9            # spirit_freq = base × 9 = 70.47 Hz → period 0.0142s
# Computation gate: heavy ops (NS eval, reasoning, interpreter) every Nth body tick
# True Schumann clocks are lightweight (phase updates); computation is gated for stability
computation_gate = 12            # heavy computation every 12 body ticks → 12/7.83 = 1.53s (profiled: 75ms avg compute)
# Epoch bounds (GABA/Chi gated, use computation_gate period as base)
epoch_min_multiplier = 3         # min epoch = computation_period × this × GABA
epoch_max_multiplier = 9         # max epoch = computation_period × this × (0.5 + chi)
epoch_floor_multiplier = 1       # absolute minimum = computation_period

# ═══════════════════════════════════════════════════════════════════
# INTERPRETER — V6 reasoning-to-action translation layer
# ═══════════════════════════════════════════════════════════════════
[interpreter]
enabled = true
epsilon_start = 0.5              # High exploration initially (no training data)
epsilon_decay = 0.995            # Slow decay — learn carefully
save_dir = "./data/interpreter"
# Per-domain interpreter NN architecture
policy_hidden_1 = 16
policy_hidden_2 = 8
learning_rate = 0.002

