sidechain = 0.12     # Topic extension: low bar

[timechain.chi_costs]
declarative = 0.005  # Facts: cheap
procedural = 0.010   # Skills: moderate (must be proven useful)
episodic = 0.003     # Experiences: cheapest
meta = 0.015         # Meta-cognition: expensive
main = 0.002         # Heartbeats: minimal
sidechain = 0.004    # Topic extension

# ── TimeChain v2 — Cognitive Memory Engine ─────────────────────────
# Wraps v1 with mempool + batched sealing + genesis chain.
# When enabled, TIMECHAIN_COMMIT messages route through orchestrator.
# When disabled, exact v1 behavior (direct commit_block per event).

[timechain.v2]
enabled = true

# Mempool — WAL-backed with bloom filter dedup
mempool_capacity = 10000          # Max pending TXs before force-seal
bloom_capacity = 100000           # Bloom filter capacity
bloom_fp_rate = 0.001             # Bloom filter false positive rate (0.1%)

# Aggregation — low-significance expression fires batched 100:1
aggregate_threshold_significance = 0.3   # Below this → aggregate (not individual TX)
aggregate_batch_size = 100               # Events per aggregate summary TX
aggregate_sources = ["expression_art", "expression_music", "expression_kin_sense", "expression_longing"]

# Adaptive sealing — blocks sealed when any condition met
seal_max_txs = 500                # Seal at N pending TXs
seal_max_time_s = 300             # Seal after N seconds (even if few TXs)
seal_significance_immediate = 0.9 # Above this → immediate seal (important moment)

# Synthesis Engine Phase 0 / 0B (D-SPEC-102, SPEC v1.40.0): content-addressed
# payload slimming. When true, a batch block offloads its tx_summaries list to
# the CAS (data/content_blobs/) and stores only a content_summaries_hash ref —
# bounds chain_episodic.bin byte growth (the inlined ~21 KB/block hotspot).
# Chain mechanics unchanged; NEW blocks only; existing blocks keep inline
# summaries (dual-shape read via resolve_batch_summaries). Default OFF —
# staged rollout T3 → T2 → T1 (mainnet last) per the soak plan.
#
# Phase 3 P3.F (D-SPEC-127): now ALSO essential for conversation-fork TXs.
# Arch §7 chat-TX content carries user_msg + agent_response + tool_calls +
# neuromods + embedding_hash + topic_tags — without CAS these inline into
# every chat block (~5-20 KB/turn × ~200 turns/day fleet-wide). With CAS the
# TX stores a single hash; the body lives once in data/content_store/.
# Per-Titan override (recommended): ~/.titan/microkernel_<id>.toml
#   [timechain.v2]
#   cas_payload_slimming_enabled = true
# Cascade procedure (PLAN_synthesis_engine_Phase3.md §P3.F):
#   1. Maker greenlight per Titan
#   2. T3 override → restart → 48-72h soak (chain_conversation.bin byte
#      growth bounded, integrity green via verify_fork)
#   3. T2 same
#   4. T1 (mainnet) last — same procedure
# Soak telemetry: BlockBuilder logs cas_slimming_active=true/false per
# seal; chain_reader resolves both shapes transparently (dual-shape).
cas_payload_slimming_enabled = false

# Genesis chain — autobiographical spine on FORK_MAIN
# Genesis seals ONLY on meditation (~4-5x/day) + timer fallback.
# Dream/emotion events trigger fork batch seals, not genesis.
genesis_seal_on_meditation = true         # Seal on meditation complete
genesis_seal_fallback_hours = 6           # Max hours between genesis blocks

# Consumer API chi costs (Phase 2)
chi_cost_submit = 0.0             # Free to submit
chi_cost_recall = 0.0005          # Query cost
chi_cost_check = 0.0002           # Boolean check cost
chi_cost_compare = 0.001          # Genesis comparison cost
chi_cost_aggregate = 0.0003       # Aggregate query cost

# Phase 4: Integrated Backup Architecture
# Backup is triggered by meditation cycles (internal), not cron (external).
# The cron job remains as a safety net but the primary trigger is now
# part of Titan's living cognitive rhythm.
backup_on_meditation = true           # Trigger backup check on meditation complete
backup_interval_hours = 6             # Min hours between Arweave uploads
arweave_network = "devnet"            # "devnet" (local) or "mainnet" (real Arweave)
arweave_keypair_path = ""             # Keypair for Arweave signing (empty = disabled)
backup_prune_after_upload = false     # Prune old TX data after confirmed upload
backup_retention_hours = 24           # Keep full TX data locally for N hours


# ─── METABOLISM (SOL-based metabolic tiers & service gating) ────────
# 6-tier starvation protocol: controls feature availability and activity
# rate based on SOL balance. Services query get_service_gate(feature)
# instead of hardcoding SOL thresholds.
#
# rate_factor: 1.0 = every invocation, 0.5 = half rate, 0.0 = stopped
# chi_factor: multiplier on Chi energy at this tier
#
# Override per-tier thresholds:
#   [metabolism.tiers.CONSERVING]
#   min_sol = 0.20        # lower the threshold
#   rate_factor = 0.75    # run at 75% instead of 50%
#
# Override per-tier feature flags:
#   [metabolism.features.CONSERVING]
#   social = true         # keep social active even when conserving

[metabolism]
# Kill-switch for Mainnet Lifecycle Wiring (rFP 2026-04-20). When false,
# gate call sites compute the decision and LOG it (observability-only);
# services proceed unchanged. When true, gate decisions are ENFORCED —
# services stop / throttle at low SOL tiers per TIER_FEATURES table.
# Rollout plan: flip true on T3 → T2 → T1 (mainnet) after 30-min focused
# observation each. Rollback = set back to false + restart.
gates_enforced = false

[metabolism.tiers.THRIVING]
# 2026-05-13: relaxed for mainnet reality (T1). Real daily burn from main
# wallet is 0.001-0.005 SOL/day (memo + occasional vault commit). 0.15 SOL
# = 30-150 day runway = comfortably "expansion budget" tier.
min_sol = 0.15
chi_factor = 1.0
rate_factor = 1.0

[metabolism.tiers.HEALTHY]
# 2026-05-13: relaxed for mainnet (was 0.3). 0.05 SOL = full chi + rate;
# T1's normal operating range. Top-up signal triggers when balance drops
# under 0.05 (drops into CONSERVING).
min_sol = 0.05
chi_factor = 1.0
rate_factor = 1.0

[metabolism.tiers.CONSERVING]
# 2026-05-13: relaxed for mainnet (was 0.15). First slowdown signal —
# half rate, slight chi reduction — gives Maker time to top up before
# real impact.
min_sol = 0.02
chi_factor = 0.8
rate_factor = 0.5

[metabolism.tiers.SURVIVAL]
# 2026-05-13 (per Maker): SURVIVAL trigger at 0.01 SOL for T1 mainnet.
# consciousness + memory only; rate-gated services halt.
min_sol = 0.01
chi_factor = 0.5
rate_factor = 0.0

[metabolism.tiers.EMERGENCY]
# 2026-05-13 (per Maker): EMERGENCY at same level as SURVIVAL (0.01).
# Tier resolution will pick SURVIVAL first; EMERGENCY effectively merged.
# Kept as named tier for back-compat with code paths that reference it.
min_sol = 0.01
chi_factor = 0.2
rate_factor = 0.0

[metabolism.tiers.HIBERNATION]
# 2026-05-13 (per Maker): HIBERNATION at 0.001 SOL — wallet dust threshold.
# Below this, all consciousness halts (chi=0) until topped up.
min_sol = 0.001
chi_factor = 0.0
rate_factor = 0.0


# ─── META-CGN (Meta-Reasoning as CGN Consumer) ──────────────────
# P11: Cross-Titan grounding transfer via Kin Protocol.
# Default OFF — Maker opts in per Titan only when organic grounding is
# insufficient (e.g., T2/T3 collapse scenarios, I-016/I-017).

[meta_cgn]
# Enable cross-Titan grounding transfer on boot (Kin Protocol import)
cross_titan_transfer = false
# If enabled, which peer Titan to pull priors from (must exist in [kin.peers])
cross_titan_source = "T1"
# Confidence scale applied to imported priors (0.5 = half-strength vs native)
cross_titan_confidence_scale = 0.5

# ── E3 β-dispersion gate (rFP_chain_iql_v2 FIX-5, 2026-04-19) ──
# compute_blend_weights caps w_grounded at `e3_dispersion_cap` when
# `_beta_dispersion_ema < e3_dispersion_threshold`. Original v1 threshold
# was 0.05 but all 3 Titans measured dispersion 0.019-0.029 — gate
# permanently on, w_grounded permanently capped, β layer permanently
# unable to drive V differentiation (chicken-and-egg). Threshold lowered
# 0.05 → 0.015 gives META-CGN real authority at currently-observed
# dispersion levels; gate re-engages if β layer ever goes silent.
# 2026-05-19 A2 (CGN quick-wins triage): lowered 0.015 → 0.010 after B1
# unfroze primitive_grounding.json. Live β-dispersion EMA ≈ 0.0118 (stdev
# of V values across 9 primitives, T1 post-B1 soak) — sat just below the
# 0.015 gate, blocking w_grounded from climbing past 0.05 cap. Lowering
# to 0.010 immediately releases the gate so w_grounded can ramp up the
# graduating curve toward 0.20 organically. Will be re-raised once β
# layer is demonstrably differentiating (target ≥ 0.020 over 24h).
e3_dispersion_threshold = 0.010
# 2026-05-20 (K1 + composition-weight): cap raised 0.05 → 0.20 so META-CGN's
# reward authority (w_grounded) follows the graduation ramp instead of a hard
# 5% floor whenever β-dispersion dips. With K1 (γ=0.99) un-saturating V,
# dispersion rises and the gate stays open; the cap is now a backstop that no
# longer under-throttles META-CGN's (correct, anti-monoculture) verdict.
e3_dispersion_cap = 0.20

# ── K1 — Beta forgetting horizon (V-saturation lever) ──
# 2026-05-20: per-observation EMA decay γ. Was hardcoded 0.999 in meta_cgn.py
# COMPOSITION_DEFAULTS (horizon ~1000 obs → ΔV/obs ≈ 0.001, below the 0.02 the
# impasse/HAOV detectors need → V-spread frozen ≈0.036 fleet-wide → monoculture
# 0.77). Lowered to 0.99 (horizon ~100 → ΔV/obs ≈ 0.01) so V can differentiate
# and META-CGN's grounding gains real magnitude. Pairs with the λ-floor removal
# (compose_template_score) so β's now-meaningful verdict actually influences
# selection. Revert: 0.999. See ARCHITECTURE_cgn_family §15.7.
ema_decay_gamma = 0.99

# ── Scale-invariant rollback detector (Option B, 2026-04-19) ──
# Rollback fires when post-grad reward mean drops below baseline_mean − k·σ
# (where baseline is the pre-graduation reward distribution). Replaces the
# previous hardcoded success_rate ≥ 0.5 threshold, which broke after
# COMPLETE-5 sunset reduced the compound reward scale from ~0.5 to ~0.27.
# rollback_reward_sigma_k: number of standard deviations below baseline_mean
#   before rollback fires. 2.0 ≈ 97.5% confidence the regression is real.
# rollback_min_std_floor: floor for effective σ (avoids super-tight triggers
#   when pre-grad rewards are tightly clustered). 0.05 = 5% reward drop floor.
rollback_reward_sigma_k = 2.0
rollback_min_std_floor = 0.05


# ─── EMOT-CGN (Emotion as 8th CGN Consumer, rFP_emot_cgn_v2) ──────
# Shadow mode first; graduation deliberately SLOWER than META-CGN per
# rFP §6 — emotions carry deeper philosophical stakes.

[emot_cgn]
# Graduation thresholds (retuned 2026-04-24 — see rationale below)
graduation_min_updates = 4000                   # was 2000 for META-CGN — keep
graduation_min_confirmed_hypotheses = 4         # out of 8 seeded (50%) — keep (already pass)
graduation_min_mature_primitives = 4            # was 6 (75%) — dropped to 4 (50%) 2026-04-24:
                                                # `mature = (n_samples>=100 AND confidence>=0.7)`. With 0.7 confidence
                                                # threshold, only the monoculture-dominant primitive reaches maturity
                                                # (confidence-as-margin metric architecturally favors dominance).
                                                # 50% threshold matches confirmed_hypotheses pattern.
graduation_min_samples_per_primitive = 100      # keep — below 100 stats aren't reliable
graduation_min_confidence = 0.5                 # was 0.7 2026-04-24 — the previous threshold
                                                # was reachable only by monoculture-dominant primitive. 0.5 captures
                                                # "primitive I can consistently identify from its cluster margin"
                                                # without requiring dominance — allows multiple primitives to mature.
# Cross-primitive contrast gate: at least 2 primitives with V differing
# by ≥ this amount (prevents graduation when clusters haven't differentiated)
graduation_contrast_v_gap = 0.15                # keep (already pass on all 3 Titans)
# Observation window — production-grade real-time sample collection
graduation_observation_window_s = 604800        # was 1209600 (14d) 2026-04-24 — dropped to 7d:
                                                # original 14d comment said "prevents rushing via synthetic training";
                                                # no synthetic training in production, just calendar delay. 7 days
                                                # captures full weekly emotional cycle in real-world operation.

# Rollback (Option B scale-invariant pattern, inherited from META-CGN 2026-04-19)
rollback_reward_sigma_k = 2.0
rollback_min_std_floor = 0.05

# F-phase EmotMeta routine pulse — fires every N seconds regardless of
# cluster ambiguity. Closes EmotMeta silence found in OBS-meta-service-
# session2-soak. Maker decision 2026-04-28: 120s cadence (max acceptable
# revaluate frequency for emotional state). Per-consumer rpm budget
# = 60/120 = 0.5/min, well under the 10/min meta_service_interface cap.
emot_meta_pulse_interval_s = 120.0

# Prior comment (2026-04-23 Q3) called the 8-primitive k-means layer
# "transitional pending replacement by emotional body rFP". Superseded
# 2026-04-24: emotional body rFP is weeks-to-months from implementation;
# EMOT-CGN v2 is Titan's active emotional system NOW and for the
# foreseeable future. Legacy-primitive tuning is legitimate quality
# work, not discouraged investment.
#
# BUG #10 fix context (2026-04-24): maybe_recenter() invocation wire was
# dead post-Phase-1.6h cutover. Fixed in emot_cgn_worker main loop. With
# the wire restored, the interval below is the REAL throttle — 7 days
# was set when recenter was (thought to be) firing weekly as a safety;
# now we know it had never fired at all. Dropped to 1 day for daily
# centroid drift toward actual observation distribution. Active fix to
# the RNG-lottery-locks-WONDER-monoculture + T1-LOVE-cold problem.

# K-means re-cluster cadence — DAILY (was 7d pre-2026-04-24)
cluster_recenter_interval_s = 86400             # 1 day (was 604800 = 7 days)

# Persistence cadence — save primitive_grounding.json every N chains.
# Lower = more granular observability during soak tests; higher = less I/O.
# v1 default: 5 chains (cheap JSON write, enables real-time V inspection
# via /v4/emot-cgn during shadow mode). Bump to 100+ once EMOT-CGN graduates
# if I/O becomes a concern (it likely won't — file is ~6KB).
save_cadence_chains = 5

# Cluster emergence threshold — N observations before an emergent slot
# (PEACE/CURIOSITY/GRIEF/WONDER/LOVE) transitions from "unemerged" to
# "emerged". Higher = more conservative; lower = faster emergence. The
# three hand-seeded anchors (FLOW, IMPASSE_TENSION, RESOLUTION) start
# emerged regardless.
cluster_emergence_threshold = 30

# Cross-Titan priors (disabled by default; off critical path like META-CGN)
cross_titan_transfer = false
cross_titan_source = "T1"
cross_titan_confidence_scale = 0.5


