neuromod_delta_threshold = 0.01     # Min neuromod delta for interoception signal
# Self-action echo (body perturbation on expression fire)
echo_inner_strength = 0.03          # Inner body echo magnitude (±0.02-0.04)
echo_outer_strength = 0.015         # Outer body echo magnitude (±0.01-0.02)
echo_decay_rate = 0.15              # Per-frame decay (5-10 frames to zero)
# Confidence ramp
confidence_ramp_onset = 200         # Convergences before log ramp starts
event_bonus_cap = 0.3               # Max accumulated event bonus
decay_threshold_epochs = 5000       # Epochs without convergence before decay
decay_rate_per_1000 = 0.001         # Confidence decay rate
decay_floor = 0.1                   # Minimum confidence once grounded
# EMA recipe
recipe_ema_alpha = 0.05             # EMA blending rate (slow, stable identity)
recipe_init_count = 10              # Convergences before recipe initializes
# Memory log
