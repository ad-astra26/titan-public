# ── PROFILING (Memory + CPU observability) ─────────────────────────
# Controls tracemalloc and /proc-based profiling for resource optimization.
# Endpoint: GET /v4/admin/memory-profile
# CLI: python scripts/arch_map.py profile [--all] [--diff] [--cpu]

[profiling]
# tracemalloc DISABLED 2026-04-18: parent CPU 76% with nframes=1.
# Re-enable attempt 2026-04-27 with nframes=5 was abandoned — boot times
# went from ~30s to 4-5 min, and /v4/admin/heap-dump endpoint timed out
# because parent process was too busy tracking allocations to respond
# to RPC. At our scale (millions of tracked allocations), tracemalloc
# overhead is non-viable for production. Stay disabled. Future leak
# investigation should use:
#   1. /v4/admin/heap-dump (gc.get_objects, ~17MB Python heap visibility)
#   2. /v4/admin/memory-profile (per-module RSS, cheap, always available)
#   3. Targeted code review of high-allocation paths (sage, meta, bus)
#   4. Lighter alternatives: pympler, py-spy attach, /proc smaps analysis
tracemalloc_enabled = false    # too costly at our scale — see comment above
tracemalloc_nframes = 1        # if re-enabled, start with 1 (5 is non-viable)
default_top_n = 25             # default top-N allocations in API response
snapshot_cache_ttl_s = 30.0    # cache tracemalloc snapshots to prevent storm
cpu_sample_duration_s = 1.0    # seconds to sample for CPU% measurement

# ── SAGE RECORDER (research replay buffer) ────────────────────────
# SageRecorder maintains a torchrl ReplayBuffer for stealth-research
# transitions. The buffer is pre-allocated at boot — every record slot
# reserves observation/action/trauma tensors as memory-mapped files.
#
# 2026-04-27 ARCHITECTURAL audit: previous default 1_000_000 records
# pre-allocated 2GB on disk + ~500MB Python heap (RssAnon) on T1, but
# the buffer held 1671 records (0.17% utilization). Lowered default to
# 50_000 — 30× headroom over current usage and ~95% smaller working set.
# On boot SageRecorder auto-migrates oversized on-disk buffers down to
# this capacity, preserving recorded transitions.
#
# Closes BUG-SAGE-INSTANTIATED-IN-PARENT (partial — addresses the
# over-allocation; does not yet move SageRecorder to its own subprocess).

[sage_memory]
buffer_size = 50000            # was 1_000_000 default; 30× headroom over T1's current 1671 records
embedding_dim = 3072           # OpenAI/nomic embedding width before projection to 128
storage_path = "./data/sage_memory/"

# ── KNOWLEDGE PIPELINE v2 (rFP_knowledge_pipeline_v2.md) ──────────
# Router + cache + health live at data/search_cache.db +
# data/knowledge_pipeline_health.json. Decision log at
# data/logs/knowledge_router_decisions.jsonl.
# Budgets are MB-per-day per backend. 0 = unlimited; knowledge_worker
# converts to bytes internally. Alert cascade fires at 80% + 100%,
# plus on circuit-open transition, both Telegram + SEARCH_PIPELINE_*
# bus events.

[knowledge_pipeline]
search_cache_path = "data/search_cache.db"
search_cache_size_cap = 10000
pipeline_health_path = "data/knowledge_pipeline_health.json"
pipeline_decision_log_path = "data/logs/knowledge_router_decisions.jsonl"
# KP-4 circuit breaker tuning
circuit_fail_threshold = 5         # consecutive failures before open
circuit_cooldown_seconds = 300     # 5 min before half-open probe
# KP-4 near-duplicate detection (optional observability)
near_dup_window = 20               # last N normalized queries tracked
near_dup_jaccard = 0.8             # Jaccard threshold for flagging
# KP-7 Maker-alert kill-switch — bus events always fire; this only gates the
# Telegram hop via maker_notify. Flip to true after the 24h soak gate
# `OBS-kp-telegram-soak` closes cleanly (no alert-storm patterns observed).
telegram_alerts_enabled = false
# KP-8 smart routing learner (rFP §3.4). Learns per (query_type, backend)
# reputation from a rolling window and reorders the static fallback chain.
# Cold start: falls back to static route() until min_samples is reached.
routing_learner_enabled = true
routing_learner_window_days = 7
routing_learner_min_samples = 10         # warm threshold per (qt, backend)
routing_learner_demote_threshold = 0.10  # drop from chain below this rep
routing_stats_path = "data/knowledge_routing_stats.db"

[knowledge_pipeline.budgets]
# Direct REST backends (structured APIs, cheap by request)
wiktionary = 50                    # MB/day — very light
free_dictionary = 20
wikipedia_direct = 100
# SearXNG variants — distillation via Sage OR raw via fetch_searxng_raw
searxng_ddg_brave_wiki = 200
searxng_google_bing = 0            # 0 = disabled (no proxy, CAPTCHAs)
searxng_news = 100
searxng_ddg_stackoverflow = 100
searxng_raw = 100                  # used by WebSearchHelper (agency)
searxng_wikipedia = 50
# Direct news backend (deferred until news API key wiring)
news_api = 100

# ═══════════════════════════════════════════════════════════════════
# META-REASONING CONSUMER SERVICE LAYER (F-phase)
# ═══════════════════════════════════════════════════════════════════
# Bidirectional consumer↔meta-reasoning protocol enabling all 8 CGN
# consumers (social, language, knowledge, reasoning, coding, self_model,
# emotional, dreaming) to query meta-reasoning as a service.
#
# See rFP: titan-docs/rFP_meta_service_interface.md §4.
# Architectural context: meta-reasoning monoculture root cause is
# missing consumer→meta invocation pathway — this section configures
# the fix.

[meta_service_interface]
# Rate limiting + backpressure (rFP §4.4)
per_consumer_requests_per_min = 10    # cap any single consumer's traffic
global_requests_per_min = 60          # total across all consumers
queue_max_depth = 20                  # drop-oldest overflow
backpressure_threshold = 15           # above this: advise consumers to back off

# DELEGATE recursion safety (rFP §14.2)
# How deep meta can recurse into itself via DELEGATE primitive.
# Default 1 (safe); opt-in 2-3 per Titan after soak validation.
delegate_recursion_max_depth = 1

# In-process thought-memory cache (rFP §4.5, §8 — Upgrade E)
cache_enabled = true
cache_max_entries = 200               # rolling window
cache_ttl_seconds = 300               # 5 min
cache_cosine_match_threshold = 0.85   # min context_vector similarity for hit

# Emergent-reward α ramp (rFP §7.3)
# α blends static STEP_REWARDS with dynamic per-(consumer, primitive, sub_mode)
# rolling means. Count-based schedule per Maker decision.
# Session 1 ships HARD-WIRED α=0.0 to validate infra without behavioral change;
# Session 3 activates the ramp after first 500-outcome threshold.
alpha_ramp_enabled = true             # RFP_meta-reasoning_CGN_FIX.md Chunk D: ACTIVATED 2026-05-15
# RFP §4.4 5-tier schedule (gentler entry than original 4-tier — α=0.10
# warm-up prevents policy thrashing when policy is 100% FORMULATE-dominant).
# ── RFP_cgn_loop_closure §7.A (2026-06-10): thresholds LOWERED ~20×. ──
# Original 500→20000 assumed hundreds of outcomes/day, but Level-A outcomes
# are EdgeDetector-gated + sparse (knowledge concept_grounded ~4/24h) → the
# count-based ramp took MONTHS (RFP §6.1 A-3). The design intent was α 0→1
# over ~2 weeks (TUNING_DATABASE §697 / rFP_meta_service_interface §10
# "compressed to days"). These values realize that intent at the live Level-A
# rate now that ARC-4 actually feeds outcomes; soak-tunable (the §8 gate is
# the live observable, not the config — INV-EMERGENCE governs which primitive
# wins, NOT ramp speed, so this is a permitted config tune per §7.A).
alpha_phase_warmup_end = 30           # 0–30     outcomes → α=0.10  (~1 day)
alpha_phase_0_end = 100               # 30–100   → α=0.25  (~3 days)
alpha_phase_1_end = 250               # 100–250  → α=0.50  (~1 week)
alpha_phase_2_end = 500               # 250–500  → α=0.75  (~1.5 weeks)
alpha_phase_3_end = 1000              # 500–1000 → α=1.00  (steady, ~2-3 weeks)
dynamic_cold_start_n = 10             # min observations before dynamic blend kicks in
# RFP §4.4 time-escape hatch — if outcome rate stalls, force α += 0.10
# every N days (lowered 7d→3d per RFP_cgn_loop_closure §6.1 A-3: the 7-day
# step bounded the rate-independent backstop to ~9 weeks, too slow vs the
# ~2-week intent; 3 days bounds the worst case to ~2.5 weeks). Tier promotion
# (legitimate count-based) resets the timer.
alpha_time_escape_enabled = true
alpha_time_escape_seconds_per_step = 259200.0  # 3 days (was 7)
alpha_time_escape_increment = 0.10
alpha_time_escape_cap = 1.0

# Signed outcome rewards (rFP §4.6)
# All outcome_reward values MUST be in [-1.0, +1.0]. Negative values
# teach meta what NOT to do — this is load-bearing for escaping monoculture.
outcome_reward_min = -1.0
outcome_reward_max = 1.0

# TimeChain query rate limit (rFP §9.5)
# Prevents meta from saturating timechain_worker.
timechain_queries_per_min = 200

# FAISS embedding index (rFP §9.3)
# Rebuilt during dream consolidation; regenerated-from-chain on restart if missing.
faiss_index_path = "data/timechain/embedding_index.faiss"
faiss_rebuild_on_restart = true       # if missing at boot, rebuild from blocks

# SIMILAR query defaults (rFP §9.2)
similar_threshold_default = 0.75
similar_limit_default = 10

# Per-consumer default time budgets (ms) — consumers may override per-request.
# Values tuned for typical latency tolerance per rFP §4.7. MANDATORY per
# request — these are guidance for consumer implementers, not a fallback.
[meta_service_interface.time_budget_ms_hint]
social = 300        # real-time conversation
language = 500      # teaching loop
knowledge = 3000    # research naturally slow
self_model = 1500   # reflective
coding = 800        # loop-tight
emotional = 200     # neuromod nudge must land fast
dreaming = 10000    # dream consolidation has all night
reflection = 2000   # between-chain reflection

# Consumer → home-worker routing (rFP §4.3)
# META_REASON_RESPONSE dst value for each consumer. Maps logical consumer_id
# to physical subscriber name (bus.subscribe name). "spirit" hosts
# social/emotional/dreaming/self_model/reflection/reasoning (they run inside
# spirit_worker); language/knowledge/cgn have dedicated workers.
[meta_service_interface.consumer_home_worker]
# Track 2 (v1.2.1) — routing remap per
# rFP_phase_c_self_improvement_subsystem_migration §4.3:
#   coding/self_model/reflection → self_reflection (was: spirit)
#   reasoning/dreaming           → cognitive_worker (was: spirit)
# Under microkernel.l0_rust_enabled=true these consumers route to the
# new dedicated L2 workers; under l0_rust=false the legacy spirit_worker_main
# still hosts them. Worker subscribes to the values listed here as its
# bus name, so renaming here MUST coincide with the worker's
# setup_worker_bus(name=...) value.
social = "spirit"                       # deferred to Track 4 (social_worker per strategy §4.C)
language = "language"
knowledge = "knowledge"
reasoning = "cognitive_worker"          # Track 2 (v1.2.1) — was spirit
coding = "self_reflection_worker"       # Track 2 (v1.2.1) — was spirit
self_model = "self_reflection_worker"   # Track 2 (v1.2.1) — was spirit
emotional = "emot_cgn"                  # emot_cgn worker (post standalone ship)
dreaming = "cognitive_worker"           # Track 2 (v1.2.1) — was spirit (cognitive_worker owns coordinator.dreaming)
reflection = "self_reflection_worker"   # Track 2 (v1.2.1) — was spirit

# ──────────────────────────────────────────────────────────────────────
# Meta-Reasoning Teacher (rFP_titan_meta_reasoning_teacher.md)
# Philosopher-critic LLM observer for meta-reasoning chains.
# Uses same Ollama Cloud light-tier model as Language Teacher (gemma4:31b).
# ──────────────────────────────────────────────────────────────────────
[meta_teacher]
# ACTIVE on T1 since 2026-04-23 19:34 UTC (rFP §11 step 2-3).
# Prompt v2 shipped 2026-04-24 addressing v1 diversity failure observed in
# T1 soak data (suggested_primitives was ~constant across 31 critiques in
# 10h; v2 constrains to MISSING-primitives-only). Maker explicitly
# greenlit T2/T3 activation alongside v2 — teacher ships enabled on all 3.
# OBS-meta-teacher-boot-soak reset to +72h on v2 deploy.
enabled = true                            # All 3 Titans enabled on v2 deploy 2026-04-24
sample_mode = "uncertainty_plus_random"   # "uncertainty_only" | "random_only" | "uncertainty_plus_random"
uncertainty_threshold = 0.4               # critique chains with chain_iql_confidence < this
random_sample_rate = 0.15                 # 15% of chains randomly regardless of uncertainty
max_critiques_per_hour = 30               # hard rate cap (~1 every 2 min)
domain_balance_floor = 0.05               # each domain ≥5% of critiques/hr
reward_weight = 0.05                      # IQL reward blend α — starts low, schedules up (§5.1)
reward_weight_cap = 0.30                  # hard cap in code — never above
grounding_weight = 0.15                   # β-posterior nudge magnitude (mirrors cross_insight)
ramp_phase1_critiques = 1000              # after N critiques, ramp reward_weight phase 1 → 0.15
ramp_phase2_critiques = 1500              # after N critiques, stable at 0.15
llm_timeout_s = 30.0                      # per-critique LLM call timeout
critique_log_retention_days = 7           # critiques.jsonl rolling retention
task_key = "meta_teacher"                 # Ollama Cloud task key → gemma4:31b (light tier)

# ── rFP_meta_teacher_v2 Phase A (2026-04-24) — Content Awareness ──
# Surfaces outer_context (composed by rFP_titan_meta_outer_layer) to the
# teacher so critiques can see WHAT each primitive was reasoning about, not
# just WHICH primitives ran. Ships on-by-default with no prompt-version bump
# (payload enrichment only); graceful fallback when outer-layer is off or
# chain had no entity_refs.
content_awareness_enabled = true          # gate for outer_summary/step_arguments injection
outer_summary_max_tokens = 300            # budget cap for distilled outer context
step_arguments_max_tokens = 80            # budget cap for per-step arg summary

# ── rFP_meta_teacher_v2 Phase B (2026-04-24) — Teaching Memory ──
# Two-tier memory — hot deque of recent critiques with embedding index +
# cold-tier per-topic_key journal. Hybrid similarity×importance retrieval
# surfaces prior critiques in the teacher's user prompt so it can notice
# patterns across sessions ("same topic stuck 5x").
#
# Default OFF originally: shipped dark, Maker-flipped per-Titan when ready.
# Bumping SYSTEM_PROMPT_VERSION 2→3 resets OBS-meta-teacher-diversity-v2 —
# the new "Similar past critiques" prompt section changes teacher
# semantics, and v2/v3 EMAs are incomparable (adoption_metrics version-
# stamped).
#
# 2026-04-24 ~13:15 UTC: flipped TRUE on all 3 Titans per Maker greenlight.
# Test suite (29 memory + 5 worker integration) validated the path; every
# memory helper is try/excepted at worker level so a memory bug can't
# block IQL. Sentence-transformer model lazy-loads on first embed call
# (~3-5s, one-time). Flip back to false is instant if anything looks off.
teaching_memory_enabled = true            # active on all 3 Titans 2026-04-24
memory_buffer_hot_size = 1000             # in-memory deque per Titan
cold_tier_archival_days = 90              # topics inactive ≥ N days → compressed archive
retrieval_top_k = 3                       # max hot-tier hits surfaced to prompt
retrieval_similarity_threshold = 0.6      # cosine floor for hot-tier inclusion
still_needs_push_critique_threshold = 3   # critiques/topic before still_needs_push fires
still_needs_push_quality_delta_epsilon = 0.05  # quality_delta ≤ this + ≥N critiques → stuck
still_needs_push_info_cadence_seconds = 86400  # 24h throttle on Maker INFO emits

# ── rFP_meta_teacher_v2 Phase C (2026-04-25) — Autonomous Voice-Tuning ──
# Periodic self-assessment LLM call evaluates recent adoption + quality delta
# patterns and proposes ONE small adjustment to per-domain biases / style
# hints / topic suppressions. Updates pass through a hard-coded principles
# window (six teacher values from SYSTEM_PROMPT) — any inversion auto-rejects.
# Applied + rejected updates land in tamper-evident voice_journal.jsonl
# (sha256-hashed before/after states) so Maker can audit + revert via
# POST /v4/meta-teacher/voice/revert?to_timestamp=<ISO8601>.
#
# Default OFF — ships dark, Maker flips per-Titan after Phase B 72h gate
# clears (OBS-meta-teacher-phase-c-voice-tuning-safety opens at flip).
# 2026-05-19: FLIPPED ON (Maker greenlight) — T1-canary first via restart-only
# rollout (titan_params.toml is shared, but T2/T3 won't pick up the value
# until their next restart). Opens OBS-meta-teacher-phase-c-voice-tuning-safety
# 7d gate. Reasoning: teacher quality scores declining (audit 2026-05-18:
# 0.391 May 11 → 0.365 May 18); letting teacher self-adapt may help. Full
# guardrails ship-active: principles validator, signed-diff journal,
# Maker revert at POST /v4/meta-teacher/voice/revert. Detail in
# titan-docs/specs/ARCHITECTURE_cgn_family.md §9.5a (canonical) + tuning log §15.
voice_tuning_enabled = true               # T1-canary 2026-05-19; T2/T3 pick up at next restart
voice_eval_interval_critiques = 50        # run self-assess every N critiques
min_critiques_between_voice_changes = 100 # rate limit; per-Titan override OK
voice_change_info_cadence_seconds = 86400 # 24h Maker INFO throttle on apply

# ── rFP_meta_teacher_v2 Phase D.1 (2026-04-25) — Cross-Titan Teaching Exchange ──
# Teachers consult each other on stuck topics — stats-only, no stylistic
# prescription. Outbound queries pipe through OVG (envelope validation +
# rate limit + redaction). Inbound responses pipe through Guardian (whitelist
# match + size budget + content sanity). HTTP transport between Titans
# (DivineBus is in-process only); intra-Titan bus messages
# META_TEACHER_PEER_QUERY / _RESPONSE land for observability + telemetry
# only. Trigger: still_needs_push fires + last peer query for similar
# topic > 24h ago.
#
# Default OFF — ships dark, Maker flips per-Titan after Phase C stable.
peer_exchange_enabled = false             # hard gate; default OFF for ship-dark
peer_query_rate_limit_per_hour = 10       # per-Titan outbound cap
peer_query_min_still_needs_push_count = 3 # min critiques on a topic before peer query
peer_query_topic_cooldown_seconds = 86400 # 24h per-topic cooldown
peer_query_http_timeout_seconds = 10.0    # outbound HTTP timeout
peer_query_log_retention_days = 30        # peer_query_log.jsonl rolling window

# ── rFP_meta_teacher_v2 Phase D.2 (2026-04-25) — IQL-Learned Peer-Query Policy ──
# Per-domain learned policy that gates whether a peer query fires. Two flags
# split observation from learning so Phase D.1 soak collects feature data
# safely:
#
#   peer_query_feature_logging   (default true) — every peer query gets
#       logged to peer_query_log.jsonl + a marker on the next critique's
#       chain_id in chain_iql buffer. Pure observation; harmless.
#
#   peer_query_reward_learning_enabled (default false) — applies +0.05 on
#       adopted suggestions following a peer-queried critique, -0.03 on
#       unadopted with quality_delta ≤ 0. EMA-tracks per-domain "peer
#       query payoff" so should_peer_query() can soft-gate when enabled.
#
# Maker flips reward_learning AFTER D.1 mechanism shows 72h clean (no OVG/
# Guardian rejection storms, rate limit respected, no stampede). Feature
# logging is safe-on by default — the EMA accumulates shadow data which the
# gate then uses once flipped.
peer_query_feature_logging = true         # safe observational; logs marker per peer query
peer_query_reward_learning_enabled = false # gates EMA → should_peer_query
peer_query_reward_adopted = 0.05          # reward bonus when adopted
peer_query_reward_unadopted = -0.03       # reward penalty when not adopted + quality_delta ≤ 0
peer_query_ema_alpha = 0.2                # EMA smoothing on per-domain payoff
peer_query_min_ema_to_query = 0.3         # below this, gate suppresses; above, allows

# Cross-Titan endpoint matrix. Per-Titan config.toml MAY override (e.g., T2/T3
# share a host so use port differentiation; T1 is on a different host). The
# self entry is filtered out at boot using config["titan_id"].
[meta_teacher.peers]
t1 = "http://203.0.113.10:7777"
t2 = "http://203.0.113.10:7777"
t3 = "http://203.0.113.10:7778"

# ═══════════════════════════════════════════════════════════════════════════
# [meta_outer] — rFP_titan_meta_outer_layer
# ═══════════════════════════════════════════════════════════════════════════
# Bridge Titan's inner and outer cognitive memory for grounded meta-reasoning.
# Code ships with enabled=false by default. Runtime activation via flag file
# /dev/shm/meta_outer_enabled.flag — controlled by POST /v4/meta-outer/enable
# and /disable endpoints. Gate flip does NOT require restart.
#
# When inactive, every outer-layer code path short-circuits and chain
# behavior is byte-identical to pre-rFP. When active, meta-reasoning chains
# can reason about specific people (social_graph.db), topics (knowledge_graph
# via bus-RPC to knowledge_worker), felt experiences (events_teacher.db),
# and peer CGN consumers' β/α state (lock-free tail of save files).
#
# See titan-docs/rFP_titan_meta_outer_layer.md for full architecture.
[meta_outer]
enabled = false                       # default OFF; activation via flag file
social_graph_path = "data/social_graph.db"
events_teacher_path = "data/events_teacher.db"
inner_memory_path = "data/inner_memory.db"
fetch_budget_ms = 200                 # overall composed-recall deadline
per_read_timeout_ms = 50              # per-source fan-out timeout
cache_ttl_s = 60                      # LRU-TTL per entry
cache_max_size = 500
max_workers = 4                       # dedicated ThreadPoolExecutor; isolated from FastAPI pool
active_search_knowledge = true        # bus-RPC to knowledge_worker (Kuzu owner)
active_search_x = false               # social_x_gateway.search — rate-limited, opt-in
active_search_events = false          # events_teacher window poll — opt-in
peer_cgn_enabled = true               # tail peer save files for β/α lookups
reward_weight = 0.0                   # chain_iql outer-use shaping (0 = observe only)

# Peer CGN save-file paths. Each consumer already persists its β/α state on
# normal save cadence. PeerCGNReader tails these lock-free with mtime-based
# cache invalidation. Consumers that don't yet write a snapshot return None
# gracefully (no error). Follow-up work in DEFERRED_ITEMS.md closes those gaps.
[meta_outer.peer_cgn_paths]
meta      = "data/meta_cgn/primitive_grounding.json"
emot      = "data/emot_cgn/emot_cgn_snapshot_v1.json"
language  = "data/language_cgn/state_snapshot.json"
social    = "data/social_cgn/state_snapshot.json"
knowledge = "data/knowledge_cgn/state_snapshot.json"
coding    = "data/coding_cgn/state_snapshot.json"
reasoning = "data/reasoning_cgn/state_snapshot.json"


# ═══════════════════════════════════════════════════════════════════
# MICROKERNEL v2 — Phase A feature flags (2026-04-24)
# ═══════════════════════════════════════════════════════════════════
#
# Spec: titan-docs/rFP_microkernel_v2_shadow_core.md
# Plan: titan-docs/PLAN_microkernel_phase_a.md
#
# All flags default FALSE except layer_tagging_enabled. Code lands
# byte-identical to pre-microkernel behavior until Maker flips a flag.
# Flag flips are done per-Titan (T2 first, T3, T1 last per meta_teacher
# soak) via CONFIG_RELOAD (no restart needed for most flags).
#
# Rollback at any time: flip flag back to false + CONFIG_RELOAD.
# ═══════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════
# Synthesis Engine (arch §0 v0.5.0 + PLAN_synthesis_engine_Phase2.md)
# Phase 2 D-P2-6: chi accounting + cap per RuleEvaluator.evaluate() call.
# Maker-tunable post-soak per arch §23 active tuning log discipline.
# ═══════════════════════════════════════════════════════════════════

[synthesis]
# Engine-side parameters consumed by titan_hcl/synthesis/*.
# d (activation decay), composite weights, etc. land here as P1 promoted
# its hardcoded defaults; currently only the chi subtable is consumed.

[synthesis.engram.grounding]
# Phase D (RFP_synthesis_engram_grounding §7.D) — the percentile-blend weights
# for the Engram grounding scalar. The scalar = weighted blend of the 4
# percentile-normalized axes, recomputed across the live population at the dream
# boundary. Weights lean on `used` at launch (the only axis with variance now);
# the blend is variance-gated (a flat axis is dropped + the remaining weights
# renormalize), so the spread is always driven by whatever signal actually exists.
w_used     = 0.40   # ACT-R B_i (episodic encounters + distinct contexts)
w_verified = 0.0    # procedural-only; N/A on thought-Engrams (§6.2.3 spine-partition / BUG-ENGRAM-AXIS-VERIFIED) — kept 0 so a stray verified value can't enter the thought-Engram blend. The variance-gate already excluded the flat axis; this locks the intent.
w_felt     = 0.20   # felt-at-lived-time coverage (§7.C)
w_fluent   = 0.15   # recall-citation rate (0 at launch — per-Engram attribution deferred)
nars_k     = 1.0    # NARS evidence horizon (verified = n/(n+nars_k))

[synthesis.chi]
# Per-op cost paid into RuleEvaluator._chi_spent each time an op is
# executed during a single evaluate() call. Costs match arch §22
# (proposed) Chi cost table; SPEC §22 + INV-Syn-6 codify on RATIFY.
# All values in SOL-units; Titan's metabolic budget gates the cap.
search    = 0.002    # FAISS top-K (arch §12.1)
fork_read = 0.001    # SQL index.db query
diff      = 0.0001   # in-context binary compare
cross_ref = 0.002    # SQL block_index.cross_refs walk
group_by  = 0.0005   # post-pass over loaded $var (D-P2-2)
recall    = 0.001    # legacy RECALL op (formalized for budget accounting)

# Hard cap on aggregate chi any single evaluate() call may spend.
# On overflow: remaining rules short-circuit, evaluator returns
# {"action": "chi_budget_exhausted", "spent": ..., "cap": ...}.
# Default 0.01 = 10× a maximum-heavy single-op rule; comfortably above
# any existing filter contract (which use only IF/AND/cmp = 0 chi).
per_eval_cap = 0.01

[synthesis.standing]
# Phase 2 D-P2-4 + D-P2-5 — StandingBundleStore caps.
# Standing contracts maintain materialized per-entity bundles in
