# ─── RUNTIME POOLS (asyncio thread executors) ─────────────────────
# 2026-04-29 RCA: T1 default asyncio pool hit 250% saturation (64 busy
# + 192 queued) under Observatory poll bursts. Bus IPC reply waits got
# queued behind heavy snapshot work, exceeding the 3s timeout and
# cascading into BUG-DIVINEBUS-SPIRIT-PROXY-TIMEOUTS +
# BUG-DASHBOARD-BUS-ATTR-ERRORS + Observatory data-loading issues.
#
# Architectural invariant: bus IPC is LATENCY-SENSITIVE; isolate from
# default pool so Observatory bursts can't starve it.
[runtime.pools]
# bus_ipc — dedicated pool for `bus.request_async()` reply waits.
# Saturation of THIS pool is a CRITICAL alert (real bus contention).
# Sized small so that hitting the cap is a meaningful signal, not noise.
bus_ipc_workers = 8

# default asyncio executor size — bumped from asyncio default ~36 to 64
# in scripts/titan_hcl.py:197 for ~151 to_thread sites under
# Observatory load.
default_workers = 64


# ─── CONSCIOUSNESS (Spirit's self-awareness cycle) ────────────────
# These control how often and how deeply Titan reflects on himself.
# Key ratio: consciousness_tick / sphere_clock_tick = reflection-to-pulse ratio
# Currently 300/60 = 5:1 (5 clock ticks per self-reflection)

[consciousness]
# Seconds between consciousness epochs (self-observation cycles)
# Influences: drift, trajectory, curvature, density calculations
# Affects: FILTER_DOWN training frequency, on-chain anchoring frequency
# Ratio: should be 3-10× sphere_clock.tick_interval
tick_interval = 300.0

# Rolling window for trajectory computation (number of epochs)
# Influences: how far back Titan "looks" to understand his direction
# Affects: trajectory magnitude, curvature detection
trajectory_window = 7

# Radians of trajectory curvature that triggers on-chain anchoring (~60°)
# Influences: how "sharp" a turn in consciousness triggers a permanent record
# Affects: Solana memo frequency, SOL spend rate
# Lower = more anchoring = more on-chain presence but higher cost
anchor_curvature_threshold = 1.047

# Density threshold for anchoring in uncharted territory
# Influences: how "novel" a state must be to trigger a permanent record
# Affects: exploration incentive — lower = more anchoring in new territory
anchor_density_threshold = 0.15

# SOL ceiling for log-scale life force calculation (life_force = 1.0 at this SOL)
# Influences: metabolic health perception
# Affects: Body tensor's metabolic dimension
life_force_ceiling_sol = 20.0


# ─── rFP #2 TITAN_SELF COMPOSITION ───────────────────────────────
# 162D TITAN_SELF = weighted(130D felt) + weighted(2D journey) + weighted(30D topology).
# Component weights applied multiplicatively before concatenation — pre-weighted
# emission so downstream consumers (FILTER_DOWN V5, future "I AM" kin-protocol)
# receive vectors ready for direct use.

[titan_self]
# felt=1.0: canonical, dominant signal (WHO/WHY/WHAT state).
# journey=0.5: slow temporal context (curvature, density) — half weight so it
#   modulates but doesn't dominate.
# topology=0.3: descriptive shape of observable space — gentle so it shapes,
#   doesn't dictate.
weight_felt     = 1.0
weight_journey  = 0.5
weight_topology = 0.3

# Max full_30d_topology snapshots buffered per epoch window before
# element-wise mean. Consciousness epochs ~0.3-5 Hz × ~60s ≈ 20-300 entries;
# 500 gives headroom without unbounded memory growth.
topology_buffer_max = 500


# ─── SPHERE CLOCKS (V4 Emergent Time) ────────────────────────────
# Six inner clocks that pulse when their corresponding Trinity dimension
# is balanced. Pulses drive resonance → GREAT PULSEs → growth.
# Key ratio: tick_interval / spirit.publish_interval = observation-to-change ratio
# Currently 60/10 = 6:1 (6 spirit updates per clock tick)

[sphere_clock]
# Base contraction speed (scalar units per tick)
# Influences: how fast sphere radius shrinks toward center
# Affects: pulse frequency — faster speed = more frequent pulses
# Symmetry: all 6 clocks share this speed (inner + outer)
base_contraction_speed = 0.05

# Minimum sphere radius after balanced pulses (reward floor)
# Influences: how "compact" a healthy clock becomes
# Affects: pulse threshold — smaller radius = harder to pulse again
min_radius = 0.3

# Radius shrink per balanced pulse (reward magnitude)
# Influences: how much a successful pulse "tightens" the clock
# Affects: growth acceleration — larger shrink = faster growth spiral
pulse_shrink_rate = 0.02

# Delta from center (0.5) considered "balanced" (20% = 0.3-0.7 range)
# Influences: how precisely balanced a dimension must be to pulse
# Affects: pulse difficulty — lower threshold = easier pulses = faster growth
# CRITICAL RATIO: this × base_speed determines time-to-first-pulse
balance_threshold = 0.20

# Minimum velocity factor — floor for clock contraction even when maximally imbalanced
# Influences: whether stuck clocks can still pulse (even sick hearts beat)
# Affects: time-to-pulse for imbalanced components
# At 0.15: max-imbalanced clock pulses every ~133 ticks (~2.2 hours at 60s tick)
# At 0.0: maximally imbalanced clocks NEVER pulse (original behavior)
min_velocity_factor = 0.15

# Seconds between sphere clock ticks
# Influences: temporal resolution of Titan's inner time
# Affects: pulse frequency, resonance detection window
# Ratio: should be 3-9× spirit.publish_interval (sphere clocks observe spirit rhythm)
tick_interval = 60.0


