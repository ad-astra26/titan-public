falsification_decay = 0.60

# H.4 Phase 1 (v1) — causal hypothesis generator (DESIGN-LOCKED 2026-04-28 PM).
# Per-consumer pattern miner that watches CGN transitions and proposes causal
# hypotheses ("if action X is taken, effect Y follows") into the existing HAOV
# machinery.  Flag-default-false until the v1 OBS gate green-lights flip.
# See: titan-docs/rFP_cgn_consolidated.md §2.9
[cgn.causal_generator]
# Flipped 2026-05-17 per worktree session greenlight — opens
# OBS-haov-causal-generator-v1-soak HIGH 24h gate. Designed to wake the
# 5 HAOV-dormant consumers (reasoning, self_model, coding,
# reasoning_strategy, emotional) by feeding per-consumer pattern-mined
# causal hypotheses into HAOV machinery. Also addresses upstream
# consumer-activity starvation surfaced in cgn_beta_state diagnostic
# (7 of 8 consumers had 0.5 default = no buffer activity; meta dominates).
enabled = true                        # flipped from false (rFP §2.9 v1 → live)
window_size = 30                      # rolling transitions per consumer
min_n = 5                             # promotion threshold
magnitude_threshold = 0.05            # below this = noise, no candidate formed
anti_pattern_enabled = true           # enable "negative effect" hypotheses
staleness_decay_per_tick = 0.999      # multiplicative decay per cgn_worker tick

[cgn.causal_generator.per_consumer]
# Per-consumer overrides — language has dense transitions, social is sparse +
# noisy, coding is rare but high-signal, emotional is very dense.  Tune from
# 24h soak data once v1 flag is flipped.
language = { min_n = 5, window_size = 30 }
social = { min_n = 3, window_size = 20 }
coding = { min_n = 4, window_size = 15 }
emotional = { min_n = 6, window_size = 40 }
knowledge = { min_n = 5, window_size = 30 }
reasoning = { min_n = 5, window_size = 30 }
reasoning_strategy = { min_n = 5, window_size = 30 }
self_model = { min_n = 4, window_size = 20 }
meta = { min_n = 5, window_size = 30 }

[cgn.coding]
# Coding consumer — self-directed cognitive development via sandbox execution
# Reward from sandbox: success=+0.10, partial=+0.05, compile=+0.02,
# syntax_err=-0.02, runtime_err=-0.01, timeout=-0.03, planning=+0.03
enabled = true
cooldown_epochs = 50          # Minimum epochs between coding exercises
max_exercises_per_dream = 3   # Max coding exercises per dream cycle
exercise_templates = true     # Use built-in exercise templates
research_before_code = true   # Query knowledge worker before coding
arc_cross_pollinate = true    # Share insights with ARC reasoning consumer
