# ═══════════════════════════════════════════════════════════════════
# TIMECHAIN — Proof of Thought Memory Architecture
# ═══════════════════════════════════════════════════════════════════
[timechain]
enabled = true
heartbeat_interval_epochs = 100    # Main chain heartbeat every N epochs
checkpoint_interval_blocks = 100   # Merkle checkpoint every N blocks
checkpoint_time_interval_s = 3600  # Merkle checkpoint every N seconds

[timechain.pot_thresholds]
main = 0.20          # Heartbeat blocks: low bar
declarative = 0.15   # Facts/vocabulary: moderate bar
procedural = 0.25    # Skills/strategies: higher bar
episodic = 0.10      # Experiences: lowest bar (most memories are episodic)
