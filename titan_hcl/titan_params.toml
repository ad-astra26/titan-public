# Training-step floor before V5 compute_multipliers stops returning all-1.0.
# Separate from min_transitions (buffer size): a buffer can fill in ~20 min
# but net convergence takes longer. Returns default multipliers until this
# floor is cleared — prevents publishing noise early in life.
cold_start_floor_epochs = 2000

# Feature flag: V5 publishes FILTER_DOWN_V5 when true. V4 reads this
# inversely and stops publishing when V5 is publishing. Flip requires
# restart (TOML reads at boot).
# Phase 6 (soak): false — V5 silent, V4 publishing
# Phase 7+ (cutover): true — V5 publisher, V4 silent training
# Flipped true 2026-04-16 after Fix A (spirit_loop compute_multipliers
