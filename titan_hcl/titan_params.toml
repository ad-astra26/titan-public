recall_inner_relevance_weight = 0.10        # FAISS sim score → reward
recall_inner_source_entropy_weight = 0.05   # Shannon entropy of source diversity
recall_kuzu_centrality_weight = 0.04        # graph centrality of recalled nodes
recall_timechain_depth_weight = 0.07        # historical depth of similar thoughts
recall_contract_ratified_weight = 0.05      # contracts that ratified recalled thoughts
recall_outcome_corr_weight = 0.10           # retroactive: did chain succeed?

# ── FORMULATE Compound — Drift + TimeChain + Contracts ──
# Range: 0.0 - 0.47
formulate_base = 0.08
formulate_anomaly_weight = 0.10             # spirit drift magnitude
formulate_anomaly_dim_weight = 0.06         # number of anomalous 132D dims
formulate_specificity_weight = 0.06         # narrowness of problem template
formulate_timechain_novelty_weight = 0.08   # prior formulation novelty (penalty if repetitive)
formulate_contract_priority_weight = 0.05   # contract priority pattern match
formulate_solvability_weight = 0.04         # heuristic solvability

# ── EVALUATE Compound — Reasoning state + TimeChain + Contracts ──
# Range: 0.0 - 0.45
evaluate_base = 0.10                            # TUNING-017: 0.08→0.10, boost minority vs FORMULATE
evaluate_info_gain_weight = 0.12            # |confidence_post - confidence_pre|
evaluate_consistency_weight = 0.08          # agreement with delegate result
evaluate_timechain_consistency_weight = 0.07 # prior evals consistency
evaluate_contract_compliance_weight = 0.05  # contract pass/fail
evaluate_timing_weight = 0.05               # midpoint sweet spot

# ── INTROSPECT Compound — Self-Reasoning + TimeChain + Contracts ──
# Range: 0.0 - 0.43
# NOTE: accuracy/deepening signals are stub until Sub-phase E (next session)
# wires SELF_PROFILE dream consolidation.
introspect_base = 0.10                          # TUNING-017: 0.08→0.10, boost minority vs FORMULATE
introspect_accuracy_weight = 0.10           # self-prediction vs actual (stub→Sub-phase E)
introspect_deepening_weight = 0.08          # profile divergence (stub→Sub-phase E)
introspect_timechain_continuity_weight = 0.07 # self-state continuity
introspect_identity_alignment_weight = 0.05 # identity contract match
introspect_calibration_weight = 0.05        # meta-confidence vs success

# ── BREAK Compound — Chain archive + TimeChain + Contracts ──
# Range: -0.05 - 0.36 (net positive — was net negative pre-fix)
break_base = 0.05
break_recovery_weight = 0.12                # post-break chain success
break_eureka_weight = 0.08                  # if BREAK enabled EUREKA
break_timechain_pattern_weight = 0.06       # historical break wisdom
break_contract_trigger_weight = 0.05        # contract-driven break
break_cost_weight = -0.05                   # always-on penalty (was -0.10)

# ── Cross-primitive (legacy diversity safety net) ──
# The legacy reward path in meta_reasoning._compute_legacy_meta_reward
# uses hardcoded 0.05 / 0.15 — these DNA keys are reserved for the future
# refactor that moves the legacy diversity logic into the DNA-driven path.
# Currently unused; kept here for forward-compatibility.
# diversity_bonus_max = 0.15
# diversity_unique_step = 0.05

# ── Sub-phase B: Chain-level IQL ──
# 2026-04-19 v2 redesign (rFP_chain_iql_v2): LRU eviction + UCB1 exploration
# replace the v1 slot-0-FIFO pathology that caused 98.7% of chains to alias
# to template_id=0 across 3 Titans for weeks. Template cap raised 50→500 to
# match principled template space (no memory/compute reason to cap at 50).
chain_iql_buffer_size = 1000        # Recent chain outcomes for IQL training
chain_template_max_count = 500      # was 50 — arbitrary v1 cap removed (rFP_chain_iql_v2 FIX-2)
task_embedding_dim = 32             # Hash size for task encoding
chain_qnet_lr = 0.001               # IQL Q-net learning rate
chain_blend_alpha = 0.5             # 50% MetaPolicy + 50% chain-Q (initial)
chain_iql_ucb_c = 0.3               # UCB1 exploration coefficient (rFP_chain_iql_v2 FIX-3)
                                    # Higher = more exploration; 0 disables UCB (argmax Q only)

# ── Sub-phase C: Cognitive contracts ──
# Detailed contract DNA lives in [cognitive_contracts_dna] below; only the
# master enable toggle stays here so the meta-reasoning engine can read it.
# (cognitive_contracts_enabled is set at the top of [meta_reasoning_dna].)

# ── Reward blending (legacy ↔ compound) ──
# Sub-phase A blends the legacy structural reward with the new per-primitive
# compound reward inside _compute_meta_reward(). Higher α → trust the new
# compound path more (faster collapse-escape, but more volatile during
# learning). Lower α → trust the legacy path more (more stable, slower
# transition). Per-Titan overrides below let each personality tune its
# trust ratio. Default 0.5 = balanced.
# 2026-04-09: lifted out of meta_reasoning.py:2305 hardcode (Phase D pre-flight).
compound_legacy_blend_alpha = 0.5

# ── Subsystem signal cache (A-finish) ──
# How long the meta-reasoning engine reuses subsystem-derived signals
# (TimeChain depth/novelty/consistency, contract counts, inner memory
# relevance) before re-querying. Per rFP §7.A: "30s default, one fetch
# per chain not per step". Resolves rFP §14 Open Question #1.
# Trade-off: lower TTL = fresher signals + more bus traffic; higher TTL =
# less bus load + more stale rewards. 30s is balanced for ~5-10 chains
# per refresh cycle.
subsystem_cache_ttl_seconds = 30

# ── Sub-phase D.1 (2026-04-09) — META_LANGUAGE closed loop ──
# External reward from language_worker grounding delta is blended into
# chain_iql buffer entries. 0.0 = ignore external, 1.0 = fully replace
# internal task_success. Default 0.5 = equal weight between internal
# compound gradient and external gradient.
# Telemetry: chain_iql.external_reward_late_drops (exposed in stats)
# tracks rewards that arrived after buffer eviction. Tune if >5% drops.
external_reward_blend_alpha = 0.5

# ── Sub-phase D.2: SOAR Impasse → Knowledge Research Loop ──
# When meta-reasoning chain hits declining rewards, trigger knowledge research.
# Cascaded: internal recall first (free/fast), external Stealth Sage only if needed.
soar_impasse_threshold_consec = 3              # 3+ declining transitions triggers impasse
soar_max_internal_recalls_per_hour = 20        # internal memory queries (free, fast)
soar_max_external_research_per_hour = 8        # Stealth Sage API calls (cost, latency)
soar_concept_cooldown_seconds = 900            # 15 min cooldown per concept
soar_urgency_plateau = 0.4                     # urgency when reward plateaus
soar_urgency_declining = 0.7                   # urgency when reward declining
soar_urgency_stuck = 0.9                       # urgency when fully stuck
soar_curiosity_momentum_bonus = 1              # lower threshold by 1 for 30min after success
soar_curiosity_momentum_duration_s = 1800      # 30 min curiosity momentum window
soar_knowledge_relevance_threshold = 0.2       # min relevance to inject into chain

# ── Sub-phase E: Self-Knowledge Integration ──
self_profile_dream_inject_weight = 10.0        # memory injection weight for self-profile
self_haov_verification_horizon_epochs = 2000   # epochs before verifying self-predictions
self_profile_diff_tracking = true              # track deltas between consecutive profiles
self_emotional_signature = true                # include emotional pattern in profile
self_prediction_as_concept = true              # ground predictions as CGN concepts
self_cross_titan_awareness = true              # include sibling comparison in profile

# ── Per-Titan overrides ──
# Each Titan has a slightly different cognitive personality.
# Same DNA architecture, different birth coefficients.

[meta_reasoning_dna.T1]
# T1 (mainnet) — slightly more conservative
recall_base = 0.07
# Cautious: trust legacy structural reward more, transition gradually
compound_legacy_blend_alpha = 0.4

[meta_reasoning_dna.T2]
# T2 — most collapsed (RECALL monoculture) — boost FORMULATE escape
formulate_anomaly_weight = 0.12
# Aggressive escape: trust compound path more so reward gradient drives
# diversification faster
compound_legacy_blend_alpha = 0.6

[meta_reasoning_dna.T3]
# T3 — most contemplative — keep introspective personality
introspect_deepening_weight = 0.10
# Balanced: default 0.5 (no override needed, but kept explicit for clarity)
compound_legacy_blend_alpha = 0.5

# ═══════════════════════════════════════════════════════════════════
# COGNITIVE CONTRACTS DNA — TUNING-012 v2 Sub-phase C
# Birth parameters for the 4 meta-cognitive contracts that observe
# chain outcomes and emit bias-adjustment events. Each contract is
# DNA-tunable per Titan, mirroring the [meta_reasoning_dna] pattern.
#
# Master enable lives in [meta_reasoning_dna].cognitive_contracts_enabled
# (so the meta_reasoning engine can read it). Individual contracts can
# be soft-disabled via the *_enabled toggles below.
#
# See: titan-docs/rFP_tuning_012_compound_rewards_v2.md §7.C
# ═══════════════════════════════════════════════════════════════════

[cognitive_contracts_dna]

# ── strategy_evolution (genesis, fires per dream cycle) ──
# R4: inverse-frequency weighting prevents Phase C from amplifying the
# current FORMULATE collapse by rewarding "winning" templates blindly.
strategy_evolution_enabled = true
strategy_window_chains = 50            # last N chains to compare
strategy_drift_min_delta = 0.10        # min rate change to fire (was strategy_evolution_min_delta)
strategy_inverse_freq_weight = 1.0     # R4: 0=off, 1=full sqrt-inverse penalty
strategy_min_template_count = 3        # ignore templates seen <N times

# ── eureka_detector (trigger, fires per chain completion) ──
# R5: per-primitive thresholds — rare primitives get a lower bar so
# EUREKA rewards diversity-of-insight, not just insight-magnitude on
# whichever primitive currently dominates.
eureka_detector_enabled = true
eureka_threshold_recall = 0.50
eureka_threshold_introspect = 0.50
eureka_threshold_break = 0.50
eureka_threshold_evaluate = 0.60
eureka_threshold_synthesize = 0.60
eureka_threshold_hypothesize = 0.65
eureka_threshold_formulate = 0.70
eureka_threshold_default = 0.60        # fallback for any unmapped primitive

# ── abstract_pattern_extraction (genesis, fires per dream cycle) ──
# R6: raised threshold (was 3 — too noisy with 22+ templates already in
# the registry post-A+B) + recency filter so old templates don't drown
# out emerging ones.
abstract_pattern_enabled = true
pattern_min_count = 10                 # was abstract_pattern_min_chains=3
pattern_lookback_chains = 50           # only consider templates seen recently
pattern_template_register_max = 50     # cap templates registered to ChainIQL

# ── monoculture_detector (R3 — NEW genesis, fires per dream cycle) ──
# THE escape-pressure contract. Detects single-primitive dominance and
# emits META_DIVERSITY_PRESSURE so spirit_worker can apply a directed
# negative bias to the dominant primitive (not random ε-greedy noise).
# This is the active control loop that turns Phase C from "passive
# observers" into "diversity enforcement."
monoculture_detector_enabled = true
monoculture_share_threshold = 0.75     # fire when single primitive >75% of last N chains (was 0.85 — too gentle)
monoculture_lookback_chains = 100
monoculture_pressure_magnitude = 0.60  # initial logit penalty on dominant (was 0.30 — doubled, 2026-04-10)
monoculture_decay_chains = 50          # decay over next N chains
monoculture_min_chains_required = 30   # don't fire on cold-start
monoculture_min_chi = 0.20             # require some metabolic budget before pressuring

# ── Per-Titan overrides ──
# Same architectural framework, different per-Titan personalities.

[cognitive_contracts_dna.T1]
# T1 (mainnet) — still cautious but firmer (FORMULATE 96% not recovering).
# 2026-04-10: raised from 0.25→0.50, lowered threshold from 0.88→0.80
monoculture_share_threshold = 0.80
monoculture_pressure_magnitude = 0.50

[cognitive_contracts_dna.T2]
# T2 — RECALL monoculture (91%, was 96%). Strongest pressure.
# 2026-04-10: raised from 0.40→0.80, lowered threshold 0.80→0.75, longer decay
monoculture_share_threshold = 0.75
monoculture_pressure_magnitude = 0.80
monoculture_decay_chains = 100

[cognitive_contracts_dna.T3]
# T3 — contemplative; rewards introspective novelty earlier and
# weights inverse-frequency more aggressively to break FORMULATE
# without sacrificing the introspect personality.
eureka_threshold_introspect = 0.45
strategy_inverse_freq_weight = 1.2

