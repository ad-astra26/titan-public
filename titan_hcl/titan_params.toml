[synthesis.tool_backstop]
# 2026-06-01 (Maker-greenlit) — deterministic tool/oracle invocation. The heavy
# agno chat context makes the main LLM NARRATE fake tool execution instead of
# emitting real tool_calls (oracle coverage sat at 0). The hooks now decide +
# act: cheap regex gate (tool_intent) → fast-model router (tool_router) → real
# coding_sandbox ToolPlug execution → TRUE verdict injected/appended.
enabled            = true     # master switch for the whole backstop
prehook_force      = true     # PreHook: run the tool BEFORE the LLM, inject verdict
posthook_backstop  = true     # OVG PostHook: salvage a missed call after the LLM
router_model_class = "fast"   # gemma3:4b — lean, no persona; only runs on gated turns
router_timeout_s   = 12.0     # soft cap on the fast-model router call
# Backstop action: "execute" — the fast-model router emits the exact code and we
# run it through the coding_sandbox ToolPlug deterministically (anchors a
# scored_by=oracle TX + injects/appends the TRUE verdict). The deterministic
# re-execution IS the retry — no 2nd main-LLM round-trip (the codegen router
# makes a no-code fallback effectively unreachable, so a reprompt mode would be
# dead weight + re-entrancy risk). Surfaced to the UI via CHAT_RESPONSE.tool_activity.
backstop_mode      = "execute"

