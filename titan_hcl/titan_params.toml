# Phase 3: Concept Cascade — YOU/YES/NO/WE/THEY Grounding
# See: titan-docs/MSL_TUNING.md for per-concept relevance maps and valence tuning
[msl.concepts]
enabled = true
# Per-concept confidence ramp onset (convergences before log ramp)
yes_ramp_onset = 100                # Easier to detect (reasoning signals clear)
no_ramp_onset = 100                 # Easier to detect (reasoning signals clear)
you_ramp_onset = 150                # Requires interaction (kin/X engagement)
we_ramp_onset = 200                 # Hardest — requires I + YOU grounded
they_ramp_onset = 50                # Easiest — any unknown engagement
