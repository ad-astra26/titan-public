data_dir = "./data/neural_nervous_system"

# ── Reward-modulated residual target gains (2026-04-19 fix) ──
# _compute_targets in autonomous phase uses: target = urgency + tanh(r) * gain
# where `gain` is fire_gain for fired transitions, nofire_gain otherwise.
# Fires get stronger shift because the NN's decision caused the outcome;
# not-fired transitions are passive observations. tanh bounds per-step shift.
# Replaces prior discrete-case formula which drove NN to sigmoid(-10)
# saturation on 98%+ reward-zero transitions.
nn_target_fire_gain = 0.3
nn_target_nofire_gain = 0.1

# ─── MATURITY (Emergent Time — nervous system developmental capacity) ──
# Maturity scales the nervous system's capacity to handle excitation.
# These are the MILESTONES at which full maturity (1.0) is reached.
# Adjustable per Titan instance via DivineCreation framework.
# Lower values = faster maturation, higher = slower/deeper development.
